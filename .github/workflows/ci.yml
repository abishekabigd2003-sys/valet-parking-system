name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./Client
        run: npm install

      - name: Run ESLint
        working-directory: ./Client
        run: npm run lint

      - name: Build React App
        working-directory: ./Client
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        # No Docker health check — GHA holds steps when health check fails during cold start.
        # Port readiness is handled by the nc loop below.

    env:
      PORT: 5001
      MONGO_URI: mongodb://127.0.0.1:27017/valet-test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_do_not_use_in_production' }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'ci-test-project' }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL || 'ci-test@ci-test.iam.gserviceaccount.com' }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY || 'ci-placeholder-key' }}
      CLIENT_URL: ${{ secrets.CLIENT_URL || 'http://localhost:5173' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm install

      - name: Diagnose MongoDB Service
        run: |
          echo "=== Running Docker containers ==="
          docker ps -a
          echo ""
          echo "=== Listening TCP ports ==="
          ss -tlnp || netstat -tlnp 2>/dev/null || true
          echo ""
          echo "=== Attempting nc probe on 27017 ==="
          nc -vz 127.0.0.1 27017 2>&1 || echo "(nc probe result above)"

      - name: Wait for MongoDB Port
        run: |
          echo "Waiting for MongoDB port 27017..."
          for i in {1..20}; do
            if nc -z 127.0.0.1 27017; then
              echo "✅ MongoDB port 27017 is open (attempt $i)."
              exit 0
            fi
            echo "Attempt $i/20: port not open yet, waiting 3s..."
            sleep 3
          done
          echo ""
          echo "❌ MongoDB port never opened. Final diagnostics:"
          docker ps -a
          MONGO_ID=$(docker ps -aqf "ancestor=mongo:7.0" 2>/dev/null || docker ps -aqf "name=mongo" 2>/dev/null || true)
          if [ -n "$MONGO_ID" ]; then
            echo "=== MongoDB container logs ==="
            docker logs "$MONGO_ID" 2>&1 || true
            echo "=== MongoDB container inspect ==="
            docker inspect "$MONGO_ID" 2>&1 | head -80 || true
          fi
          exit 1

      - name: Start Backend Server
        working-directory: ./server
        run: |
          echo "Starting backend server on port $PORT..."
          node index.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo "Waiting for server at http://127.0.0.1:$PORT/..."
          npx --yes wait-on "http://127.0.0.1:$PORT/" --timeout 60000 --interval 1000
          echo "✅ Server is ready."

      - name: Run End-to-End Tests
        working-directory: ./server
        run: |
          echo "Running E2E tests..."
          node e2e_test.js
          echo "✅ E2E tests completed."

